server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static assets — long cache, fingerprinted filenames.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # /api/ → backend container on the docker network.
    # Trailing slash on proxy_pass means the matched prefix is
    # rewritten away, so /api/foo at nginx becomes /api/foo at
    # Django (the prefix is preserved because the Django app
    # already mounts under /api/ via dashboard_project.urls).
    location /api/ {
        proxy_pass http://backend:8002/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pipeline runs can be slow on full refresh.
        proxy_read_timeout 600s;
        proxy_connect_timeout 30s;
    }

    # SPA fallback — every non-asset, non-api path serves the React
    # index so client-side routing works for /sales, /pipeline, etc.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
